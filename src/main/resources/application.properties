spring.application.name=Task-Manager
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.locations=classpath:db/migration

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JWT HMAC secret - must be at least 256 bits (32 bytes) for HS256
# Generate with: openssl rand -base64 64
jwt.secret=${JWT_SECRET:default-dev-secret-that-is-at-least-32-bytes-long-for-hs256}